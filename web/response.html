<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Ghost · Conversa</title>
    <script src="vendor/marked.min.js"></script>
    <link rel="stylesheet" href="pixel-ghost.css?v=1.0.3">
    <style>
        :root {
            --mica-base: #202020;
            --layer-1: rgba(255, 255, 255, 0.0512);
            --layer-2: rgba(255, 255, 255, 0.0837);
            --layer-3: rgba(255, 255, 255, 0.1051);
            --stroke-subtle: rgba(255, 255, 255, 0.0698);
            --stroke-default: rgba(255, 255, 255, 0.0931);
            --stroke-strong: rgba(255, 255, 255, 0.1395);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.786);
            --text-tertiary: rgba(255, 255, 255, 0.5442);
            --accent: #61dbb4;
            --accent-hover: #7ae4c3;
            --accent-rest-bg: rgba(97, 219, 180, 0.12);
            --on-accent: #00281e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: transparent;
        }
        body {
            font-family: 'Segoe UI Variable Display', 'Segoe UI Variable', 'Segoe UI',
                         system-ui, -apple-system, sans-serif;
            color: var(--text-primary);
            padding: 10px;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }
        .panel {
            height: 100%;
            background: rgba(28, 28, 28, 0.92);
            backdrop-filter: blur(60px) saturate(135%);
            -webkit-backdrop-filter: blur(60px) saturate(135%);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 10px;
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.48),
                        0 0 0 1px rgba(0, 0, 0, 0.2),
                        inset 0 1px 0 rgba(255, 255, 255, 0.04);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Titlebar Windows 11 style */
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 0 0 12px;
            height: 36px;
            border-bottom: 1px solid var(--stroke-subtle);
            flex-shrink: 0;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.02), transparent);
        }
        .brand-icon {
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, var(--accent), #3cb895);
            border-radius: 3px;
            box-shadow: 0 1px 2px rgba(97, 219, 180, 0.28);
            flex-shrink: 0;
        }
        .brand-text {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.1px;
        }
        .brand-sub {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-left: 4px;
        }
        .head-actions {
            margin-left: auto;
            display: flex;
            height: 100%;
        }
        .head-btn {
            width: 40px;
            height: 36px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s, color 0.1s;
        }
        .head-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
        }
        .head-btn.close:hover {
            background: #c42b1c;
            color: #fff;
        }
        .head-btn svg { width: 12px; height: 12px; }
        .head-btn.active-tts {
            background: var(--accent-rest-bg);
            color: var(--accent);
        }
        .head-btn.active-tts:hover {
            background: rgba(97, 219, 180, 0.2);
            color: var(--accent);
        }

        /* Chat scroll */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 14px 14px 10px 14px;
            scrollbar-width: thin;
            scrollbar-color: var(--stroke-strong) transparent;
            user-select: text;
        }
        .chat::-webkit-scrollbar { width: 6px; }
        .chat::-webkit-scrollbar-track { background: transparent; }
        .chat::-webkit-scrollbar-thumb {
            background: var(--stroke-strong);
            border-radius: 3px;
        }
        .chat::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .msg { margin-bottom: 12px; }
        .msg:last-child { margin-bottom: 4px; }

        .msg-user { display: flex; justify-content: flex-end; }
        .msg-user-bubble {
            background: var(--accent);
            color: var(--on-accent);
            border-radius: 8px;
            border-top-right-radius: 2px;
            padding: 8px 11px;
            max-width: 88%;
            font-size: 13px;
            line-height: 1.45;
            font-weight: 500;
            white-space: pre-wrap;
            word-break: break-word;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.16);
        }
        .msg-user-bubble img {
            display: block;
            width: 100%;
            max-height: 160px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 6px;
        }

        .msg-assistant { width: 100%; }
        .msg-assistant-head {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 5px;
        }
        .avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #3cb895);
            color: var(--on-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.24);
        }
        .tag {
            font-size: 10px;
            letter-spacing: 0.3px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .speak-btn {
            margin-left: auto;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--layer-1);
            color: var(--text-secondary);
            border: 1px solid var(--stroke-default);
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 10.5px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.12s, color 0.12s, border-color 0.12s;
            height: 20px;
        }
        .speak-btn:hover {
            background: var(--layer-2);
            color: var(--text-primary);
            border-color: var(--stroke-strong);
        }
        .speak-btn.speaking {
            background: var(--accent-rest-bg);
            color: var(--accent);
            border-color: rgba(97, 219, 180, 0.35);
        }
        .speak-btn svg { width: 10px; height: 10px; }
        .speak-bars {
            display: inline-flex;
            align-items: flex-end;
            gap: 1.5px;
            height: 9px;
        }
        .speak-bars span {
            display: block;
            width: 2px;
            background: currentColor;
            border-radius: 1px;
            animation: speak-bar 0.9s ease-in-out infinite;
        }
        .speak-bars span:nth-child(1) { height: 40%; }
        .speak-bars span:nth-child(2) { height: 85%; animation-delay: 0.15s; }
        .speak-bars span:nth-child(3) { height: 60%; animation-delay: 0.3s; }
        .speak-bars span:nth-child(4) { height: 90%; animation-delay: 0.45s; }
        @keyframes speak-bar {
            0%, 100% { transform: scaleY(0.4); }
            50% { transform: scaleY(1); }
        }

        .msg-assistant-body {
            font-size: 13px;
            line-height: 1.52;
            color: var(--text-primary);
        }
        .msg-assistant-body h1, .msg-assistant-body h2, .msg-assistant-body h3 {
            color: var(--text-primary);
            font-weight: 600;
            margin: 8px 0 4px;
            letter-spacing: -0.2px;
        }
        .msg-assistant-body h1 { font-size: 15px; }
        .msg-assistant-body h2 { font-size: 14px; }
        .msg-assistant-body h3 { font-size: 13px; }
        .msg-assistant-body p { margin: 4px 0; }
        .msg-assistant-body ul, .msg-assistant-body ol { padding-left: 20px; margin: 4px 0; }
        .msg-assistant-body li { margin: 2px 0; }
        .msg-assistant-body strong { color: var(--text-primary); font-weight: 600; }
        .msg-assistant-body a { color: var(--accent); text-decoration: none; }
        .msg-assistant-body code:not(pre code) {
            background: var(--layer-2);
            color: #ffd866;
            padding: 1px 5px;
            border-radius: 4px;
            font-family: 'Cascadia Code', 'Consolas', monospace;
            font-size: 11.5px;
            border: 1px solid var(--stroke-subtle);
        }
        .msg-assistant-body pre {
            position: relative;
            background: #1c1c1c;
            border: 1px solid var(--stroke-subtle);
            border-radius: 6px;
            padding: 30px 11px 9px 11px;
            overflow-x: auto;
            font-size: 11.5px;
            font-family: 'Cascadia Code', 'Consolas', monospace;
            margin: 6px 0;
            max-height: 180px;
            overflow-y: auto;
            color: var(--text-primary);
        }
        .msg-assistant-body pre::before {
            content: attr(data-lang);
            position: absolute;
            top: 6px;
            left: 10px;
            font-size: 9px;
            color: var(--text-tertiary);
            text-transform: lowercase;
            letter-spacing: 0.3px;
            pointer-events: none;
        }
        .code-copy-popup-btn {
            position: absolute;
            top: 5px;
            right: 6px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(45, 45, 45, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: var(--text-primary);
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 500;
            cursor: pointer;
            z-index: 3;
            transition: all 0.12s;
        }
        .code-copy-popup-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .code-copy-popup-btn.copied {
            background: var(--accent-rest-bg);
            border-color: var(--accent);
            color: var(--accent);
        }

        .loading-dots {
            display: inline-flex;
            gap: 3px;
            margin-left: 4px;
        }
        .loading-dots span {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent);
            animation: bounce 1.1s ease-in-out infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-2px); opacity: 1; }
        }

        .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-tertiary);
            font-size: 12px;
            text-align: center;
            padding: 20px;
            gap: 6px;
        }
        .empty-icon {
            font-size: 28px;
            opacity: 0.55;
            animation: pulse-soft 2.8s ease-in-out infinite;
        }
        @keyframes pulse-soft {
            0%, 100% { opacity: 0.55; }
            50% { opacity: 0.25; }
        }

        /* Transcript destacado dentro do bubble do user */
        .msg-transcript {
            background: rgba(0, 0, 0, 0.24);
            border-left: 3px solid rgba(0, 0, 0, 0.42);
            border-radius: 5px;
            padding: 6px 9px 7px 9px;
            margin-bottom: 7px;
            color: rgba(0, 40, 30, 0.85);
        }
        .msg-transcript-head {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            color: rgba(0, 40, 30, 0.8);
            margin-bottom: 3px;
        }
        .msg-transcript-head svg { width: 10px; height: 10px; }
        .msg-transcript-body {
            font-size: 12px;
            line-height: 1.5;
            color: rgba(0, 40, 30, 0.92);
            font-style: italic;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .msg-transcript-body::before { content: '"'; }
        .msg-transcript-body::after { content: '"'; }

        /* Actions row (speak, copy, select) */
        .msg-actions {
            margin-left: auto;
            display: inline-flex;
            align-items: center;
            gap: 3px;
            flex-wrap: wrap;
        }
        .msg-action-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--layer-1);
            color: var(--text-secondary);
            border: 1px solid var(--stroke-default);
            border-radius: 4px;
            padding: 2px 7px;
            font-size: 10.5px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.12s, color 0.12s;
            height: 20px;
        }
        .msg-action-btn:hover {
            background: var(--layer-2);
            color: var(--text-primary);
            border-color: var(--stroke-strong);
        }
        .msg-action-btn svg { width: 10px; height: 10px; }
        .msg-action-btn.flash {
            background: var(--accent-rest-bg);
            color: var(--accent);
            border-color: rgba(97, 219, 180, 0.4);
        }

        /* Tooltip flutuante (JS-driven) */
        .gtooltip {
            position: fixed;
            z-index: 10000;
            pointer-events: none;
            opacity: 0;
            transform: translateY(2px);
            transition: opacity 0.12s ease, transform 0.12s ease;
            background: rgba(42, 42, 42, 0.98);
            color: #fff;
            padding: 6px 10px;
            font-size: 11.5px;
            font-weight: 500;
            line-height: 1.35;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            max-width: 220px;
            width: max-content;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.48);
        }
        .gtooltip.visible { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <div class="panel">
        <div class="header">
            <span class="brand-text" id="popupTitle">Conversa</span>
            <div class="head-actions">
                <button class="head-btn" onclick="stopSpeaking()" data-tooltip-pos="below" data-tooltip="Parar leitura" id="stopBtn" style="display:none">
                    <svg viewBox="0 0 12 12" fill="none"><rect x="3" y="3" width="6" height="6" rx="1" fill="currentColor"/></svg>
                </button>
                <button class="head-btn close" onclick="closePopup()" data-tooltip-pos="below" data-tooltip="Fechar">
                    <svg viewBox="0 0 12 12" fill="none"><path d="M2.5 2.5l7 7M9.5 2.5l-7 7" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
                </button>
            </div>
        </div>
        <div class="chat" id="chat">
            <div class="empty">
                <div class="empty-icon pixel-ghost"></div>
                <div>Nenhuma interação ainda</div>
                <div style="font-size:11px;opacity:0.7">Digite algo na barra inferior</div>
            </div>
        </div>
    </div>

    <script>
        marked.setOptions({ breaks: true, gfm: true });

        let _ttsVoice = null;
        let _autoSpeak = false;
        let _speakingIdx = -1;
        let _lastMessagesCount = 0;

        function _initTTS() {
            if (!('speechSynthesis' in window)) return;
            const pick = () => {
                const voices = window.speechSynthesis.getVoices() || [];
                if (!voices.length) return;
                // Prefer neural/natural voices (muito melhor que SAPI padrão)
                _ttsVoice =
                    voices.find(v => /pt[-_]BR/i.test(v.lang) && /(natural|neural|online|francisca|antonio|thalita|heloís)/i.test(v.name)) ||
                    voices.find(v => /^pt/i.test(v.lang) && /(natural|neural|online)/i.test(v.name)) ||
                    voices.find(v => /pt[-_]BR/i.test(v.lang)) ||
                    voices.find(v => /^pt/i.test(v.lang)) ||
                    voices[0];
            };
            pick();
            window.speechSynthesis.onvoiceschanged = pick;
        }
        _initTTS();

        // ===== Global tooltip manager =====
        (function() {
            let tipEl = null, showTimer = null, currentEl = null;
            function getTip() {
                if (!tipEl) { tipEl = document.createElement('div'); tipEl.className = 'gtooltip'; document.body.appendChild(tipEl); }
                return tipEl;
            }
            function show(el) {
                const text = el.getAttribute('data-tooltip');
                if (!text) return;
                const below = el.getAttribute('data-tooltip-pos') === 'below';
                const tip = getTip();
                tip.textContent = text;
                tip.style.left = '-9999px'; tip.style.top = '-9999px';
                tip.classList.add('visible');
                const rect = el.getBoundingClientRect();
                const tRect = tip.getBoundingClientRect();
                let left = rect.left + rect.width / 2 - tRect.width / 2;
                let top = below ? rect.bottom + 8 : rect.top - tRect.height - 8;
                left = Math.max(6, Math.min(left, window.innerWidth - tRect.width - 6));
                top = Math.max(6, Math.min(top, window.innerHeight - tRect.height - 6));
                tip.style.left = left + 'px'; tip.style.top = top + 'px';
            }
            function hide() { if (tipEl) tipEl.classList.remove('visible'); currentEl = null; clearTimeout(showTimer); }
            document.addEventListener('mouseover', (e) => {
                const el = e.target.closest('[data-tooltip]');
                if (!el) return;
                const text = el.getAttribute('data-tooltip');
                if (!text) { hide(); return; }
                if (el === currentEl) return;
                currentEl = el;
                clearTimeout(showTimer);
                showTimer = setTimeout(() => { if (currentEl === el) show(el); }, 400);
            });
            document.addEventListener('mouseout', (e) => {
                if (!currentEl) return;
                if (e.relatedTarget && currentEl.contains(e.relatedTarget)) return;
                const el = e.target.closest('[data-tooltip]');
                if (el && el !== currentEl) return;
                hide();
            });
            window.addEventListener('scroll', hide, true);
            window.addEventListener('resize', hide);
            document.addEventListener('mousedown', hide);
        })();

        try {
            _autoSpeak = localStorage.getItem('ghost_auto_speak') === '1';
            const btn = document.getElementById('autoSpeakBtn');
            if (btn && _autoSpeak) btn.classList.add('active-tts');
        } catch (e) {}

        function escapeHTML(s) {
            const div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }

        function stripMarkdown(md) {
            if (!md) return '';
            try {
                const html = marked.parse(md);
                const div = document.createElement('div');
                div.innerHTML = html;
                div.querySelectorAll('pre, code').forEach(el => {
                    el.replaceWith(document.createTextNode(' código omitido. '));
                });
                return (div.textContent || '').replace(/\s+/g, ' ').trim();
            } catch (e) {
                return md.replace(/[*_`#>\-\[\]()]/g, ' ').replace(/\s+/g, ' ').trim();
            }
        }

        let _ttsAudio = null;

        function _speakText(text, idx) {
            // Browser speechSynthesis instantâneo (sem OpenAI round-trip)
            if (!('speechSynthesis' in window)) return false;
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'pt-BR';
            utter.rate = 1.0;
            utter.pitch = 1.0;
            if (_ttsVoice) utter.voice = _ttsVoice;
            utter.onend = () => {
                _speakingIdx = -1;
                _updateStopBtn();
                _refreshSpeakButtons();
            };
            utter.onerror = () => {
                _speakingIdx = -1;
                _updateStopBtn();
                _refreshSpeakButtons();
            };
            window.speechSynthesis.speak(utter);
            return true;
        }

        function _updateStopBtn() {
            const stopBtn = document.getElementById('stopBtn');
            if (!stopBtn) return;
            stopBtn.style.display = _speakingIdx >= 0 ? 'flex' : 'none';
        }

        function _refreshSpeakButtons() {
            document.querySelectorAll('.speak-btn').forEach(btn => {
                const idx = parseInt(btn.dataset.idx, 10);
                if (idx === _speakingIdx) {
                    btn.classList.add('speaking');
                    btn.innerHTML = `<span class="speak-bars"><span></span><span></span><span></span><span></span></span><span>Parar</span>`;
                } else {
                    btn.classList.remove('speaking');
                    btn.innerHTML = `<svg viewBox="0 0 14 14" fill="none"><path d="M5 4.5H3a1 1 0 00-1 1v3a1 1 0 001 1h2l3 2.5v-10L5 4.5z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/><path d="M10 5.2c.8.7.8 2.9 0 3.6" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg><span>Ouvir</span>`;
                }
            });
        }

        window.copyPopupMsg = async function(idx, btn) {
            try {
                const msgEl = btn.closest('.msg');
                const body = msgEl?.querySelector('.msg-assistant-body');
                const text = (body?.innerText || body?.textContent || '').trim();
                if (!text) return;
                await navigator.clipboard.writeText(text);
                const span = btn.querySelector('span');
                const orig = span.textContent;
                btn.classList.add('flash');
                span.textContent = 'Copiado';
                setTimeout(() => {
                    btn.classList.remove('flash');
                    span.textContent = orig;
                }, 1500);
            } catch (e) { console.warn('copy failed', e); }
        };

        window.copyPopupSel = async function(idx, btn) {
            try {
                const sel = window.getSelection();
                const selected = sel ? sel.toString().trim() : '';
                const span = btn.querySelector('span');
                if (!selected) {
                    const orig = span.textContent;
                    span.textContent = 'Arraste no texto primeiro';
                    setTimeout(() => { span.textContent = orig; }, 1500);
                    return;
                }
                const msgEl = btn.closest('.msg');
                if (msgEl && sel.rangeCount > 0) {
                    if (!msgEl.contains(sel.getRangeAt(0).commonAncestorContainer)) {
                        const orig = span.textContent;
                        span.textContent = 'Selecione dentro da resposta';
                        setTimeout(() => { span.textContent = orig; }, 1500);
                        return;
                    }
                }
                await navigator.clipboard.writeText(selected);
                const orig = span.textContent;
                btn.classList.add('flash');
                span.textContent = 'Trecho copiado';
                setTimeout(() => {
                    btn.classList.remove('flash');
                    span.textContent = orig;
                }, 1500);
            } catch (e) { console.warn('copy sel failed', e); }
        };

        window.branchFromPopup = async function(idx) {
            try {
                if (!window.pywebview?.api?.branch_main_conversation) {
                    console.warn('branch api not available');
                    return;
                }
                await window.pywebview.api.branch_main_conversation(idx);
                // O main window vai sair do compact + atualizar a conversa.
                // Fecha o popup pois o usuário verá o novo chat no main.
                try { window.closePopup && window.closePopup(); } catch (e) {}
            } catch (e) {
                console.warn('branch popup failed', e);
            }
        };

        window.toggleSpeakMsg = async function(idx, rawText) {
            if (_speakingIdx === idx) {
                if (_ttsAudio) { _ttsAudio.pause(); _ttsAudio = null; }
                window.speechSynthesis.cancel();
                _speakingIdx = -1;
                _updateStopBtn();
                _refreshSpeakButtons();
                return;
            }
            const text = stripMarkdown(rawText);
            if (!text) return;
            _speakingIdx = idx;
            _updateStopBtn();
            _refreshSpeakButtons();
            await _speakText(text, idx);
        };

        window.toggleAutoSpeak = function() {
            _autoSpeak = !_autoSpeak;
            try { localStorage.setItem('ghost_auto_speak', _autoSpeak ? '1' : '0'); } catch(e) {}
            const btn = document.getElementById('autoSpeakBtn');
            if (btn) btn.classList.toggle('active-tts', _autoSpeak);
            if (!_autoSpeak && _speakingIdx >= 0) {
                window.speechSynthesis.cancel();
                _speakingIdx = -1;
                _updateStopBtn();
                _refreshSpeakButtons();
            }
        };

        window.stopSpeaking = function() {
            if (_ttsAudio) { _ttsAudio.pause(); _ttsAudio = null; }
            window.speechSynthesis.cancel();
            _speakingIdx = -1;
            _updateStopBtn();
            _refreshSpeakButtons();
        };

        window.setPopupTitle = function(title) {
            const el = document.getElementById('popupTitle');
            if (!el) return;
            const t = (title || '').trim();
            // Trunca pra caber no header
            const shown = t.length > 40 ? t.slice(0, 37) + '…' : t;
            el.textContent = shown || 'Conversa';
        };

        window.setMessages = function(messages) {
            const chat = document.getElementById('chat');
            if (!messages || !messages.length) {
                chat.innerHTML = `<div class="empty"><div class="empty-icon pixel-ghost"></div><div>Nenhuma interação ainda</div><div style="font-size:11px;opacity:0.7">Digite algo na barra inferior</div></div>`;
                _lastMessagesCount = 0;
                return;
            }

            // Detect new completed assistant message for auto-speak
            const prevCount = _lastMessagesCount;
            _lastMessagesCount = messages.length;
            const last = messages[messages.length - 1];
            const newFinished = _autoSpeak
                && messages.length >= prevCount
                && last && last.role === 'assistant'
                && !last.loading
                && last.text
                && (window._lastSpokenText !== last.text);
            if (newFinished) {
                window._lastSpokenText = last.text;
                const idx = messages.length - 1;
                const text = stripMarkdown(last.text);
                if (text) {
                    _speakingIdx = idx;
                    _updateStopBtn();
                    _speakText(text, idx);
                }
            }

            const html = messages.map((m, idx) => {
                if (m.role === 'user') {
                    const img = m.image
                        ? `<img src="${m.image}" alt="">`
                        : '';
                    const transcriptBlock = m.transcript
                        ? `<div class="msg-transcript">
                             <div class="msg-transcript-head">
                                <svg viewBox="0 0 12 12" fill="none"><path d="M2 4h1.5l2.5-2v8L3.5 8H2a0.8 0.8 0 01-.8-0.8V4.8A0.8 0.8 0 012 4z" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/></svg>
                                <span>Trecho de áudio</span>
                             </div>
                             <div class="msg-transcript-body">${escapeHTML(m.transcript)}</div>
                           </div>`
                        : '';
                    return `<div class="msg"><div class="msg-user"><div class="msg-user-bubble">${img}${transcriptBlock}${escapeHTML(m.text || '')}</div></div></div>`;
                } else {
                    const isLoading = m.loading;
                    const bodyHtml = isLoading
                        ? '<div class="loading-dots"><span></span><span></span><span></span></div>'
                        : marked.parse(m.text || '');
                    const hasText = !isLoading && m.text;
                    const actions = hasText
                        ? `<div class="msg-actions">
                             <button class="speak-btn" data-idx="${idx}" data-tooltip="Ler em voz alta" onclick='toggleSpeakMsg(${idx}, ${JSON.stringify(m.text)})'>
                               <svg viewBox="0 0 14 14" fill="none"><path d="M5 4.5H3a1 1 0 00-1 1v3a1 1 0 001 1h2l3 2.5v-10L5 4.5z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/><path d="M10 5.2c.8.7.8 2.9 0 3.6" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
                               <span>Ouvir</span>
                             </button>
                             <button class="msg-action-btn" data-idx="${idx}" data-tooltip="Copiar resposta inteira" onclick='copyPopupMsg(${idx}, this)'>
                               <svg viewBox="0 0 14 14" fill="none"><rect x="3" y="3" width="7" height="9" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M5 3V2a1 1 0 011-1h5a1 1 0 011 1v8a1 1 0 01-1 1h-1" stroke="currentColor" stroke-width="1.2"/></svg>
                               <span>Copiar</span>
                             </button>
                             <button class="msg-action-btn" data-idx="${idx}" data-tooltip="Arraste no texto pra selecionar, depois clique aqui" onmousedown="event.preventDefault()" onclick='copyPopupSel(${idx}, this)'>
                               <svg viewBox="0 0 14 14" fill="none"><path d="M3 3h8M3 6h8M3 9h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><rect x="7" y="7" width="5" height="5" rx="0.5" stroke="currentColor" stroke-width="1.2"/></svg>
                               <span>Copiar trecho</span>
                             </button>
                             <button class="msg-action-btn" data-idx="${idx}" data-tooltip="Abrir novo chat com contexto desta conversa" onclick='branchFromPopup(${idx})'>
                               <svg viewBox="0 0 14 14" fill="none"><circle cx="3.5" cy="3" r="1.5" stroke="currentColor" stroke-width="1.2"/><circle cx="3.5" cy="11" r="1.5" stroke="currentColor" stroke-width="1.2"/><circle cx="10.5" cy="7" r="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M3.5 4.5v5M5 3c2 0 4 1 5.5 3M5 11c2 0 4-1 5.5-3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
                               <span>Branch</span>
                             </button>
                           </div>`
                        : '';
                    return `<div class="msg"><div class="msg-assistant"><div class="msg-assistant-head"><div class="avatar pixel-ghost-mini"></div><span class="tag">ASSISTANT</span>${actions}</div><div class="msg-assistant-body">${bodyHtml}</div></div></div>`;
                }
            }).join('');
            chat.innerHTML = html;
            _injectCodeCopyButtons(chat);
            _refreshSpeakButtons();
            chat.scrollTop = chat.scrollHeight;
        };

        function _injectCodeCopyButtons(root) {
            // Adiciona botão "Copiar" em cada <pre> de code
            root.querySelectorAll('pre').forEach(pre => {
                if (pre.querySelector('.code-copy-popup-btn')) return;
                const btn = document.createElement('button');
                btn.className = 'code-copy-popup-btn';
                btn.innerHTML = '<svg viewBox="0 0 12 12" fill="none" width="10" height="10"><rect x="3" y="3" width="6" height="8" rx="0.8" stroke="currentColor" stroke-width="1.2"/><path d="M4.5 3V2a1 1 0 011-1h4a1 1 0 011 1v7a1 1 0 01-1 1h-1" stroke="currentColor" stroke-width="1.2"/></svg><span>Copiar</span>';
                btn.setAttribute('data-tooltip', 'Copiar código');
                btn.onclick = () => {
                    const code = pre.querySelector('code');
                    const text = (code?.textContent || code?.innerText || '').trim();
                    if (!text) return;
                    navigator.clipboard.writeText(text).then(() => {
                        const label = btn.querySelector('span');
                        const orig = label.textContent;
                        label.textContent = 'Copiado';
                        btn.classList.add('copied');
                        setTimeout(() => {
                            label.textContent = orig;
                            btn.classList.remove('copied');
                        }, 1400);
                    });
                };
                pre.appendChild(btn);

                // Lang badge via classe "language-X" no code
                const code = pre.querySelector('code');
                if (code) {
                    const lang = (code.className.match(/language-([a-z0-9+\-]+)/i) || [])[1];
                    if (lang) pre.setAttribute('data-lang', lang);
                }
            });
        }

        window.closePopup = function() {
            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.hide_response_popup();
            }
        };
    </script>
</body>
</html>
