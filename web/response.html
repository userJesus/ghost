<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Ghost · Conversa</title>
    <script src="vendor/marked.min.js"></script>
    <!-- Shared helpers (escapeHTML, stripMarkdown, tooltip manager, TTS voice picker).
         Must load after marked and before the page's inline script block. -->
    <script src="shared/common.js"></script>
    <link rel="stylesheet" href="pixel-ghost.css?v=1.0.12">
    <!-- CSS extracted to css/response.css for editability (was inline). -->
    <link rel="stylesheet" href="css/response.css?v=1.1.16">
</head>
<body>
    <div class="panel">
        <div class="header">
            <span class="brand-text" id="popupTitle">Conversa</span>
            <div class="head-actions">
                <button class="head-btn" onclick="stopSpeaking()" data-tooltip-pos="below" data-tooltip="Parar leitura" id="stopBtn" style="display:none">
                    <svg viewBox="0 0 12 12" fill="none"><rect x="3" y="3" width="6" height="6" rx="1" fill="currentColor"/></svg>
                </button>
                <button class="head-btn close" onclick="closePopup()" data-tooltip-pos="below" data-tooltip="Fechar">
                    <svg viewBox="0 0 12 12" fill="none"><path d="M2.5 2.5l7 7M9.5 2.5l-7 7" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
                </button>
            </div>
        </div>
        <div class="chat" id="chat">
            <div class="empty">
                <div class="empty-icon pixel-ghost"></div>
                <div>Nenhuma interação ainda</div>
                <div style="font-size:11px;opacity:0.7">Digite algo na barra inferior</div>
            </div>
        </div>
    </div>

    <!-- JS extracted to js/response.js for editability (was inline). -->
    <script src="js/response.js?v=1.1.16"></script>
</body>
</html>
