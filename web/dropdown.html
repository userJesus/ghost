<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Ghost · Dropdown</title>
    <style>
        :root {
            --accent: #61dbb4;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.78);
            --text-tertiary: rgba(255, 255, 255, 0.55);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none;
            -webkit-user-drag: none; -webkit-app-region: no-drag; }
        html, body {
            width: 100%; height: 100vh;
            background: transparent;
            overflow: hidden;
            font-family: 'Segoe UI Variable Display', 'Segoe UI Variable', 'Segoe UI',
                         -apple-system, 'Helvetica Neue', sans-serif;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }
        .flyout {
            width: 100%;
            height: 100%;
            background: rgba(45, 45, 45, 0.98);
            backdrop-filter: blur(40px) saturate(135%);
            -webkit-backdrop-filter: blur(40px) saturate(135%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 0, 0, 0.28);
            padding: 4px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.22) transparent;
        }
        /* Espelha a scrollbar global do modo normal (style.css) para manter
           a experiência visual consistente entre os dois modos. */
        .flyout::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .flyout::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 5px;
        }
        .flyout::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.14);
            border-radius: 5px;
            border: 2px solid transparent;
            background-clip: padding-box;
            transition: background 0.15s ease;
        }
        .flyout:hover::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.26);
            background-clip: padding-box;
        }
        .flyout::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.42);
            background-clip: padding-box;
        }
        .flyout::-webkit-scrollbar-thumb:active {
            background: rgba(97, 219, 180, 0.55);
            background-clip: padding-box;
        }
        .flyout::-webkit-scrollbar-corner {
            background: transparent;
        }
        .label {
            font-size: 10.5px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            padding: 6px 10px 4px;
        }
        .opt {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 8px 10px;
            background: transparent;
            border: none;
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 400;
            text-align: left;
            cursor: pointer;
            transition: background 0.1s ease;
        }
        .opt:hover { background: rgba(255,255,255,0.08); }
        .opt.selected { color: var(--accent); font-weight: 500; }
        .opt .check-slot {
            width: 12px; display: inline-flex; justify-content: center; color: var(--accent);
            font-weight: 700;
        }
        .opt-icon { width: 14px; display: inline-flex; justify-content: center; }
        .placeholder { padding: 12px 10px; color: var(--text-tertiary); font-size: 12px; }
    </style>
</head>
<body>
    <div class="flyout" id="flyout"><div class="placeholder">Carregando…</div></div>
    <script>
        // payload = { kind: 'preset'|'captureMode'|'monitor', items: [{value,label,icon?}], selected }
        window.setDropdown = function(payload) {
            const flyout = document.getElementById('flyout');
            flyout.innerHTML = '';
            const kind = payload.kind || '';
            const items = payload.items || [];
            const selected = payload.selected;
            const labels = {
                preset: 'Preset de análise',
                captureMode: 'Modo de captura',
                monitor: 'Monitor',
            };
            if (labels[kind]) {
                const lab = document.createElement('div');
                lab.className = 'label';
                lab.textContent = labels[kind];
                flyout.appendChild(lab);
            }
            for (const it of items) {
                const btn = document.createElement('button');
                btn.className = 'opt' + (String(it.value) === String(selected) ? ' selected' : '');
                const check = document.createElement('span');
                check.className = 'check-slot';
                check.textContent = String(it.value) === String(selected) ? '✓' : '';
                btn.appendChild(check);
                if (it.icon) {
                    const ico = document.createElement('span');
                    ico.className = 'opt-icon';
                    ico.textContent = it.icon;
                    btn.appendChild(ico);
                }
                const label = document.createElement('span');
                label.textContent = it.label;
                btn.appendChild(label);
                btn.addEventListener('click', () => {
                    try { window.pywebview.api.dropdown_pick(kind, it.value); }
                    catch (e) { console.error(e); }
                });
                flyout.appendChild(btn);
            }
            setTimeout(() => {
                const sel = flyout.querySelector('.opt.selected');
                if (sel) sel.scrollIntoView({ block: 'nearest' });
            }, 30);
        };

        // Close on blur (user clicks outside or focuses another window).
        window.addEventListener('blur', () => {
            try { window.pywebview.api.hide_dropdown_popup(); } catch (_) {}
        });
        // Close on Esc.
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                try { window.pywebview.api.hide_dropdown_popup(); } catch (_) {}
            }
        });
    </script>
</body>
</html>
