<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Ghost · Dropdown</title>
    <style>
        :root {
            --accent: #61dbb4;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.78);
            --text-tertiary: rgba(255, 255, 255, 0.55);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100vh;
            background: transparent;
            overflow: hidden;
            font-family: 'Segoe UI Variable Display', 'Segoe UI Variable', 'Segoe UI',
                         -apple-system, 'Helvetica Neue', sans-serif;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }
        .flyout {
            width: 100%;
            height: 100%;
            background: rgba(45, 45, 45, 0.98);
            backdrop-filter: blur(40px) saturate(135%);
            -webkit-backdrop-filter: blur(40px) saturate(135%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 0, 0, 0.28);
            padding: 4px;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        .flyout::-webkit-scrollbar { width: 6px; }
        .flyout::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 3px; }
        .label {
            font-size: 10.5px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            padding: 6px 10px 4px;
        }
        .opt {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 7px 10px;
            background: transparent;
            border: none;
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 400;
            text-align: left;
            cursor: pointer;
            transition: background 0.1s ease;
        }
        .opt:hover { background: rgba(255,255,255,0.08); }
        .opt.selected { color: var(--accent); font-weight: 500; }
        .opt.selected::before { content: '✓'; color: var(--accent); width: 12px; display: inline-block; }
        .opt:not(.selected)::before { content: ''; width: 12px; display: inline-block; }
        .opt-icon { width: 14px; display: inline-flex; justify-content: center; }
        .label-of { padding: 8px 10px; color: var(--text-tertiary); font-size: 12px; }
    </style>
</head>
<body>
    <div class="flyout" id="flyout">
        <div class="label-of">Carregando…</div>
    </div>
    <script>
        // Called by Python via evaluate_js when show_dropdown_popup fires.
        // payload = { kind: 'preset' | 'captureMode' | 'monitor', items: [...], selected: <value> }
        window.setDropdown = function(payload) {
            const flyout = document.getElementById('flyout');
            flyout.innerHTML = '';

            const kind = payload.kind || '';
            const items = payload.items || [];
            const selected = payload.selected;

            const labels = {
                preset: 'Preset de análise',
                captureMode: 'Modo de captura',
                monitor: 'Monitor',
            };
            if (labels[kind]) {
                const lab = document.createElement('div');
                lab.className = 'label';
                lab.textContent = labels[kind];
                flyout.appendChild(lab);
            }
            for (const it of items) {
                const btn = document.createElement('button');
                btn.className = 'opt' + (String(it.value) === String(selected) ? ' selected' : '');
                if (it.icon) {
                    const ico = document.createElement('span');
                    ico.className = 'opt-icon';
                    ico.textContent = it.icon;
                    btn.appendChild(ico);
                }
                const label = document.createElement('span');
                label.textContent = it.label;
                btn.appendChild(label);
                btn.addEventListener('click', () => {
                    try {
                        window.pywebview.api.dropdown_pick(kind, it.value);
                    } catch (e) { console.error(e); }
                });
                flyout.appendChild(btn);
            }
            // Scroll to selected so the user sees the current choice first.
            setTimeout(() => {
                const sel = flyout.querySelector('.opt.selected');
                if (sel) sel.scrollIntoView({ block: 'nearest' });
            }, 30);
        };

        // Losing focus closes the popup (mimics native menu behaviour).
        window.addEventListener('blur', () => {
            try { window.pywebview.api.hide_dropdown_popup(); } catch (_) {}
        });
        // Esc also closes.
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                try { window.pywebview.api.hide_dropdown_popup(); } catch (_) {}
            }
        });
    </script>
</body>
</html>
