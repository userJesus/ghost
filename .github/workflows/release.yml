name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows executable
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-release-${{ hashFiles('**/requirements.txt', '**/dev-requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-release-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt || pip install -r dev-requirements.txt

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --onefile --windowed --name Ghost --icon assets/ghost.ico --add-data "web;web" --add-data "assets;assets" main.py

      - name: Generate SHA256 checksum
        run: CertUtil -hashfile dist/Ghost.exe SHA256 > dist/Ghost.exe.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghost-windows
          path: |
            dist/Ghost.exe
            dist/Ghost.exe.sha256

  release:
    name: Publish GitHub release
    needs: build-windows
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ghost-windows
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Ghost.exe
            dist/Ghost.exe.sha256
          generate_release_notes: true
          draft: false
