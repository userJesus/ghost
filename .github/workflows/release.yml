name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # -----------------------------------------------------------------
  # WINDOWS — PyInstaller + Inno Setup → GhostSetup-<version>.exe
  # -----------------------------------------------------------------
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-release-${{ hashFiles('**/requirements.txt', '**/dev-requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt
          pip install "svg.path" Pillow

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Extract version
        id: v
        shell: pwsh
        run: |
          $ver = (Select-String -Path src/version.py -Pattern '__version__\s*=\s*"([^"]+)"').Matches.Groups[1].Value
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Generate icons
        run: python scripts/make_icons.py

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean ghost.spec

      - name: Compile installer (Inno Setup)
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=${{ steps.v.outputs.version }} installer\windows\ghost.iss

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghost-windows
          path: installer/windows/Output/GhostSetup-*.exe

  # -----------------------------------------------------------------
  # macOS — port planned; currently not shipped. See README roadmap.
  # -----------------------------------------------------------------
  # (no build-macos job)

  # -----------------------------------------------------------------
  # RELEASE — attach the Windows installer to the GitHub release
  # -----------------------------------------------------------------
  release:
    name: Publish GitHub release
    needs: [build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ghost-windows
          path: dist

      - name: Create version-less alias (stable /releases/latest/download/GhostSetup.exe URL)
        shell: bash
        run: |
          cd dist
          shopt -s nullglob
          for f in GhostSetup-*.exe; do cp "$f" GhostSetup.exe; done

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/GhostSetup-*.exe
            dist/GhostSetup.exe
            dist/SHA256SUMS.txt
          generate_release_notes: true
          draft: false
          body: |
            ## 📦 Download

            | Platform | File | |
            |----------|------|------|
            | 🪟 Windows 10/11 | [`GhostSetup.exe`](https://github.com/userJesus/ghost/releases/latest/download/GhostSetup.exe) | instala sem admin |
            | 🍏 macOS         | _em breve (port em andamento)_ | |

            Verifique a integridade com `SHA256SUMS.txt`.

            ## ⚖️ Licença

            Ghost é distribuído sob **NCSAL v1.0** (source-available, **uso não-comercial**).
            Para uso comercial, contate `contato.jesusoliveira@gmail.com`.

