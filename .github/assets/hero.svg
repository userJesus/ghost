<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="Ghost — desktop AI assistant">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1f1a"/>
      <stop offset=".55" stop-color="#0a1612"/>
      <stop offset="1" stop-color="#040807"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#61DBB4"/>
      <stop offset="1" stop-color="#3CB895"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#61DBB4" stop-opacity=".35"/>
      <stop offset="1" stop-color="#61DBB4" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="360" fill="url(#bg)"/>

  <!-- Twinkle stars (static for performance) -->
  <g fill="#FDFDFD" opacity=".55">
    <circle cx="120"  cy="60"  r="1.2"><animate attributeName="opacity" values=".2;.9;.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="260"  cy="140" r="1.5"><animate attributeName="opacity" values=".3;1;.3"  dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="80"   cy="280" r="1"  ><animate attributeName="opacity" values=".1;.7;.1" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="80"  r="1.5"><animate attributeName="opacity" values=".3;.9;.3" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="1190" cy="260" r="1.2"><animate attributeName="opacity" values=".2;.8;.2" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="960"  cy="310" r="1.3"><animate attributeName="opacity" values=".2;.9;.2" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="50"  r="1.2"><animate attributeName="opacity" values=".1;.7;.1" dur="3.4s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Ghost cluster, floats up and down -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0 0; 0 -14; 0 0" keyTimes="0;.5;1" dur="4s" repeatCount="indefinite"/>

    <!-- Glow behind ghost -->
    <ellipse cx="300" cy="180" rx="200" ry="170" fill="url(#glow)" filter="url(#soft)">
      <animate attributeName="rx" values="180;220;180" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".6;1;.6" dur="4s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Ghost body (from icon_ghost.svg), scaled + centered to (300, 180) -->
    <g transform="translate(180 40) scale(.22)">
      <path d="M265.825 2.45867C311.428 -5.78888 387.747 7.48183 428.696 30.7783C486.535 63.6907 525.657 112.376 549.244 180.761C560.439 213.204 564.8 310.789 557.18 358.125C542.077 451.956 493.45 536.994 422.119 594.356C381.484 627.034 312.173 667.471 296.835 667.471C282.793 667.47 274.722 661.47 274.722 650.995C274.722 647.145 288.351 628.364 305.025 609.23C339.845 569.263 358.976 541.255 365.928 520.05C376.161 488.838 359.741 465.639 327.414 465.639C311.958 465.639 307.678 467.633 295.148 480.707C287.194 488.994 274.527 506.895 266.985 520.479C239.607 569.789 189.072 619.236 126.441 657.972C62.5534 697.471 32.6033 704.193 11.9425 683.613C-5.71308 666.063 -4.02527 650.193 18.5598 621.444C28.5957 608.682 41.58 589.312 47.3934 578.426C54.3487 565.43 58.0734 550.963 58.2529 536.24L60.1972 376.594C62.1612 215.689 63.2625 192 69.6059 172.768C99.8038 81.076 166.844 21.8627 261.325 3.31251L265.825 2.45867ZM211.13 135.262C168.437 135.262 133.828 169.703 133.828 212.188C133.828 254.673 168.437 289.114 211.13 289.114C253.821 289.113 288.431 254.672 288.431 212.188C288.431 169.703 253.822 135.263 211.13 135.262ZM407.212 135.262C364.52 135.262 329.91 169.703 329.91 212.188C329.911 254.673 364.52 289.114 407.212 289.114C449.904 289.113 484.514 254.672 484.514 212.188C484.514 169.703 449.904 135.263 407.212 135.262Z"
            fill="#FDFDFD"/>
    </g>
  </g>

  <!-- Wordmark + tagline -->
  <g transform="translate(560 150)" fill="#FDFDFD" font-family="-apple-system, Segoe UI Variable, Segoe UI, Inter, sans-serif">
    <text font-size="88" font-weight="700" letter-spacing="-2">Ghost</text>
    <text y="40" font-size="19" opacity=".72" letter-spacing=".4">
      Assistente desktop de IA · invisível em screen-share
    </text>
    <text y="70" font-size="19" opacity=".72" letter-spacing=".4">
      Lê sua tela · transcreve reuniões · responde via OpenAI
    </text>

    <!-- Pill: Windows + macOS -->
    <g transform="translate(0 100)">
      <rect x="0" y="0" width="210" height="36" rx="18" fill="url(#accent)"/>
      <text x="105" y="23" font-size="13" font-weight="700" fill="#00281e" text-anchor="middle" letter-spacing=".4">
        WINDOWS · macOS  v1.0
      </text>
    </g>

    <!-- Pill: non-commercial -->
    <g transform="translate(224 100)">
      <rect x="0" y="0" width="186" height="36" rx="18" fill="none" stroke="#61DBB4" stroke-width="1.2"/>
      <text x="93" y="23" font-size="13" font-weight="600" fill="#61DBB4" text-anchor="middle" letter-spacing=".4">
        NCSAL v1.0 · non-commercial
      </text>
    </g>
  </g>
</svg>
